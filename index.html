<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adventurer's Guild - Quest Board</title>

  <!-- Link to our CSS file -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>⚔️ The Adventurer's Guild Quest Board</h1>

  <!-- The Quest Card -->
  <div class="quest-card">
    <h2 class="quest-title">Defeat the CSS Dragon</h2>
    <p class="quest-description">
      A fearsome dragon is breaking layouts across the kingdom.
      Brave heroes are needed to tame its styles and restore
      peace to the web. Reward: 100 gold coins.
    </p>

    <!-- The button heroes click to accept the quest -->
    <button id="accept-btn">Accept Quest</button>
  </div>

  <!-- Link to our JavaScript file (placed at the end so the HTML loads first) -->
  <script src="script.js"></script>
</body>
</html>
